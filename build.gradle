plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.2'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'jacoco'
    id "org.sonarqube" version "4.4.1.3373"
}

sonarqube {
    properties {
        property "sonar.projectKey", "chaing-backend"
        property "sonar.host.url", "http://beyond21.iptime.org:7011"
        property "sonar.token", "sqp_af86ebfcb52046b70985dd61ed8987912936db86"
        property "sonar.coverage.jacoco.xmlReportPaths", "build/jacoco/xml/jacocoRootReport.xml"
    }
}

// лЈЁнҠё н”„лЎңм қнҠё repositories (sonar нғңмҠӨнҒ¬ мқҳмЎҙм„ұ н•ҙм„қмҡ©)
repositories {
    mavenCentral()
}

def jacocoProjectNames = ["domain-orders", "domain-returns", "domain-sales", "domain-inventories", "domain-users", "domain-franchises"]

// лӘЁл“  н•ҳмң„ н”„лЎңм қнҠё кіөнҶө м„Өм •
subprojects {
    group = 'com.chaing'
    version = '0.0.1-SNAPSHOT'
    sourceCompatibility = '17'

    apply plugin: 'java'
    apply plugin: 'java-library'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: 'jacoco'

    configurations {
        compileOnly {
            extendsFrom annotationProcessor
        }
    }

    repositories {
        mavenCentral()
    }

    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter'
        implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'com.h2database:h2'
    }

    test {
        useJUnitPlatform()
        finalizedBy 'jacocoTestReport'
    }

    // вҳ… [н•өмӢ¬] м ңмҷён•  нҢЁн„ҙ м •мқҳ (м—¬кё°м—җ лӢӨ лӘЁмңјм„ёмҡ”)
    def Qdomains = []
    for (qPattern in '**/QA'..'**/QZ') {
        Qdomains.add(qPattern + '*')
    }

    def jacocoExcludes = [
            "**/config/**",
            "**/config/**/*",

            "**/dto/**",
            "**/dto/**/*",

            "**/*Application*",

            "**/command/**",
            "**/command/**/*",

            "**/info/**",
            "**/info/**/*",

            "**/exception/**",
            "**/exception/**/*",

            "**/infrastructure/**",
            "**/infrastructure/**/*",

            "**/*Builder*",
            "**/Q*",

            "**/enums/**",
            "**/enums/**/*",

            "**/HeadOffice*",
            "**/HeadOffice*/**/*"
    ] + Qdomains

    // вҳ… jacocoTestCoverageVerificationмҡ© (м •к·ңнҷ”лҗң нҒҙлһҳмҠӨ мқҙлҰ„ нҢЁн„ҙ)
    def QdomainsVerification = []
    for (qPattern in 'QA'..'QZ') {
        QdomainsVerification.add('*.' + qPattern + '*')
    }

    def jacocoVerificationExcludes = [
            "*.config.*",
            "*.dto.*",
            "*.*Application*",
            "*.command.*",
            "*.info.*",
            "*.exception.*",
            "*.infrastructure.*",
            "*.*Builder*",
            "*.Q*",
            "*.enums.*",
            "*.HeadOffice*",
    ] + QdomainsVerification

    afterEvaluate {

        // 1. лҰ¬нҸ¬нҠё мғқм„ұ мӢң м ңмҷё (classDirectories н•„н„°л§Ғ)
        jacocoTestReport {
            reports {
                html.required.set(true)
                xml.required.set(true)
                csv.required.set(true)
            }

            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, exclude: jacocoExcludes)
            }))
        }

        // 2. м»ӨлІ„лҰ¬м§Җ кІҖмҰқ мӢң м ңмҷё
        jacocoTestCoverageVerification {
            // classDirectoriesм—җм„ңлҸ„ м ңмҷё (нҢҢмқј кІҪлЎң нҢЁн„ҙ)
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, exclude: jacocoExcludes)
            }))

            violationRules {
                rule {
                    enabled = true
                    element = 'CLASS'

                    // вҳ… JaCoCo нҒҙлһҳмҠӨ мқҙлҰ„ нҢЁн„ҙмңјлЎң м ңмҷё
                    excludes = jacocoVerificationExcludes

                    limit {
                        counter = 'LINE'
                        value = 'COVEREDRATIO'
                        minimum = 0.80
                    }
                }
            }
        }
    }

    check.dependsOn jacocoTestCoverageVerification

    bootJar {
        enabled = false
    }
    jar {
        enabled = true
    }
}

// лЈЁнҠё н”„лЎңм қнҠё м„Өм •
bootJar {
    enabled = false
}
jar {
    enabled = true
}

task jacocoRootReport(type: JacocoReport) {
    description = 'Generates an aggregate report from all subprojects'
    dependsOn subprojects.jacocoTestReport

    def projects = subprojects.findAll { jacocoProjectNames.contains(it.name) }

    sourceDirectories.setFrom projects.sourceSets.main.allSource.srcDirs
    classDirectories.setFrom projects.sourceSets.main.output
    executionData.setFrom projects.jacocoTestReport.executionData

    reports {
        html.required.set(true)
        xml.required.set(true)
        csv.required.set(true)

        html.outputLocation.set(layout.buildDirectory.dir('jacoco/html'))
        xml.outputLocation.set(layout.buildDirectory.file('jacoco/xml/jacocoRootReport.xml'))
    }

    // лЈЁнҠё лҰ¬нҸ¬нҠём—җм„ңлҸ„ м ңмҷё мІҳлҰ¬ (м„ нғқмӮ¬н•ӯ)
    def Qdomains = []
    for (qPattern in '**/QA'..'**/QZ') {
        Qdomains.add(qPattern + '*')
    }
    def rootExcludes = [
            "**/config/**", "**/config/**/*",
            "**/dto/**", "**/dto/**/*",
            "**/*Application*",
            "**/command/**", "**/command/**/*",
            "**/info/**", "**/info/**/*",
            "**/exception/**", "**/exception/**/*",
            "**/infrastructure/**", "**/infrastructure/**/*",
            "**/*Builder*",
            "**/Q*",
            "**/enums/**", "**/enums/**/*",
            "**/HeadOffice*", "**/HeadOffice*/**/*"
    ] + Qdomains

    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: rootExcludes)
        }))
    }
}
