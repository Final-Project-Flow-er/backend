<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;">
<table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.1);">

                <tr>
                    <td align="center" style="padding: 50px 0 30px 0; background-color: #ffffff; border-bottom: 1px solid #f1f5f9;">
                        <img src="cid:logo" alt="CHAING LOGO" width="220" style="display: block; border: 0;">
                        <p style="font-size: 11px; color: #94a3b8; margin-top: 15px; letter-spacing: 4px; text-transform: uppercase;">Supply Chain Management</p>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 50px;">
                        <div style="text-align: center; margin-bottom: 40px;">
                            <h2 style="font-size: 26px; color: #0f172a; margin: 0 0 10px 0; font-weight: 800;">WELCOME TO CHAING</h2>
                            <p style="font-size: 15px; color: #475569; line-height: 1.6; margin: 0;">
                                귀하의 계정이 성공적으로 생성되었습니다.<br>아래의 자격 증명을 사용하여 시스템에 접속하십시오.
                            </p>
                        </div>

                        <div style="background-color: #0f172a; color: #ffffff; padding: 35px; border-radius: 12px; margin: 20px 0;">
                            <table width="100%" border="0" cellspacing="0" cellpadding="0" style="color: #cbd5e1; font-size: 14px;">
                                <tr>
                                    <td style="padding-bottom: 15px; border-bottom: 1px solid #1e293b; font-weight: bold; letter-spacing: 1px; color: #ffffff;">USER CREDENTIALS</td>
                                </tr>
                                <tr>
                                    <td style="padding-top: 25px;">
                                        <p style="margin: 8px 0;">ID: <span style="color: #ffffff; font-weight: bold; margin-left: 10px;" th:text="${loginId}">hq0001</span></p>
                                        <p style="margin: 8px 0;">PW: <span style="color: #38bdf8; font-weight: bold; margin-left: 10px;" th:text="${tempPassword}">pw1234!</span></p>
                                        <p style="margin: 8px 0;">EMP NO: <span style="color: #ffffff; font-weight: bold; margin-left: 10px;" th:text="${employeeNumber}">10001</span></p>
                                    </td>
                                </tr>
                            </table>
                        </div>

                        <div style="text-align: center; margin-top: 40px;">
                            <p style="font-size: 13px; color: #64748b; margin-bottom: 30px;">
                                * 보안을 위해 로그인 후 <strong>마이페이지</strong>에서 비밀번호를 변경해 주세요.
                            </p>
                            <a href="http://localhost:3000/login" style="display: inline-block; padding: 18px 50px; background-color: #1e293b; color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold; letter-spacing: 1px;">SYSTEM LOGIN</a>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 30px; background-color: #f8fafc; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0;">
                        &copy; 2026 CHAING Team. All rights reserved.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
