<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;">
<table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.1);">

                <tr>
                    <td align="center" style="padding: 50px 0 30px 0; background-color: #ffffff;">
                        <img src="cid:logo" alt="CHAING LOGO" width="220" style="display: block; border: 0;">
                        <p style="font-size: 11px; color: #94a3b8; margin-top: 15px; letter-spacing: 4px; text-transform: uppercase;">Supply Chain Management</p>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 0 50px 50px 50px;">
                        <div style="text-align: center; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                            <h2 style="font-size: 24px; color: #0f172a; margin-bottom: 15px; font-weight: 800;">ACCOUNT INFORMATION</h2>
                            <p style="font-size: 15px; color: #475569; line-height: 1.6;">
                                요청하신 회원 정보 안내 메일입니다.<br>아래 정보를 확인하여 로그인을 진행해 주세요.
                            </p>
                        </div>

                        <div style="background-color: #0f172a; padding: 35px 20px; border-radius: 12px; text-align: center; margin: 35px 0;">

                            <div style="padding-bottom: 25px; border-bottom: 1px solid #334155;">
                                <p style="margin: 0 0 10px 0; font-size: 11px; color: #94a3b8; letter-spacing: 1.5px; text-transform: uppercase;">Login ID</p>
                                <h3 style="margin: 0; font-size: 28px; color: #ffffff; font-weight: bold; letter-spacing: 1px;" th:text="${loginId}">hq202603001</h3>
                            </div>

                            <div style="padding-top: 25px;">
                                <p style="margin: 0 0 10px 0; font-size: 11px; color: #94a3b8; letter-spacing: 1.5px; text-transform: uppercase;">Employee No.</p>
                                <h3 style="margin: 0; font-size: 28px; color: #ffffff; font-weight: bold; letter-spacing: 1px;" th:text="${employeeNumber}">10001</h3>
                            </div>

                        </div>

                        <div style="text-align: center;">
                            <a th:href="${loginUrl}" style="display: inline-block; padding: 18px 50px; border: 2px solid #0f172a; color: #0f172a; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold;">GO TO LOGIN</a>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 25px; background-color: #f8fafc; text-align: center; font-size: 12px; color: #94a3b8;">
                        &copy; 2026 CHAING. Secure Supply Chain System.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
